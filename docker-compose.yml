version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: doodads-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: doodads_db  # nome do banco (pode mudar se o seu projeto usa outro)

volumes:
  mongo-data:
